<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenZ Kids Phonics App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-shape shape-1">🎨</div>
    <div class="bg-shape shape-2">🎈</div>
    <div class="bg-shape shape-3">🌟</div>
    <div class="bg-shape shape-4">🧸</div>

    <div class="app-container">
        <div id="welcome-screen">
            <div class="logo-animation">🚀</div>
            <h1>GenZ Kids</h1>
            <p class="welcome-tagline">Welcome to the Ultimate Phonics Adventure!</p>
            <p class="welcome-subtext">Click the golden button below to start learning your letters, words, and sounds with fun animations!</p>
            <button id="start-btn" class="action-btn gold-btn">Let's Play! 🎉</button>
        </div>

        <div id="app-header" class="app-header hidden">
            <h2 id="game-question">Where is the alphabet A?</h2>
            <div id="progress-container" class="progress-bar-container hidden">
                <div id="progress-indicator"></div>
            </div>
        </div>

        <div id="grid-screen" class="grid hidden"></div>

        <div id="card-screen" class="card-display hidden">
            <span id="big-letter">A</span>\r
            <div id="emoji-display" class="emoji-pop">🍎</div>
            <p id="word-text" class="word-reveal">Apple</p>
            <button id="back-btn" class="action-btn back-btn">Next Letter ➡️</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
